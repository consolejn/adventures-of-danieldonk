<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Main Menu -->
  <div id="main-menu">
    <h1 id="game-title">ADVENTURES OF DANIEL DONK</h1>
    <button id="start-button" class="flash-text">START</button>

    <!-- <button id="mute-button">Mute Music</button> -->

    <audio id="menu-music" loop autoplay>
      <source src="assets/audio/MainMenuMusicOption2.wav" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>

  <!-- Game UI -->
  <div id="game-ui">
    <div id="text-box"></div>
    <div id="choices"></div>

    <div id="controls">
      <button onclick="skipTyping()">SKIP</button>
      <button onclick="toggleMusic()">TOGGLE MUSIC</button>
      <audio id="bgm" loop>
        <!-- STILL YET TO ADD MUSIC FOR GAME UI -->
        <source src="assets/audio/name_of_music_file.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
